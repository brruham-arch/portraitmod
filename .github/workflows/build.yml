name: Build portraitmod

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup NDK r25c
        run: |
          cd $HOME
          wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -q android-ndk-r25c-linux.zip
          mv android-ndk-r25c ndk
          echo "NDK=$HOME/ndk" >> $GITHUB_ENV

      - name: Build
        run: |
          $NDK/ndk-build \
            NDK_PROJECT_PATH=. \
            NDK_APPLICATION_MK=jni/Application.mk \
            APP_BUILD_SCRIPT=jni/Android.mk \
            NDK_OUT=obj \
            NDK_LIBS_OUT=libs \
            -j$(nproc)

      - name: Verifikasi output
        run: |
          echo "=== File output ==="
          ls -lh libs/armeabi-v7a/
          echo "=== Exported symbols ==="
          $NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-nm \
            -D libs/armeabi-v7a/libportraitmod.so | grep " T "
          echo "=== Undefined symbols ==="
          $NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-nm \
            -D libs/armeabi-v7a/libportraitmod.so | grep " U "
          echo "=== Strings penting ==="
          strings libs/armeabi-v7a/libportraitmod.so | grep -E "PORTRAIT|brruham|portrait"

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: libportraitmod
          path: libs/armeabi-v7a/libportraitmod.so
